{{ define "main" }}
<div class="container-fluid search-container">
  <div class="row">
    <div class="col-md-12 offset-md-2 mt-5">
      
      <h2 class="mb-4">{{ .Title }}</h1>
      
      <div class="search-intro mb-4">
        {{ .Content }}
      </div>

      <h3 id="search-status"></h3>

      <div id="search-results-container">
        <p id="search-loading">Loading results...</p>
      </div>

    </div>
  </div>
</div>

<template id="search-result-item-template">
  <div>
    <a class="result-link"></a>
    <p class="result-url"></p>
    <p class="result-snippet"></p>
  </div>
</template>
{{ end }}
